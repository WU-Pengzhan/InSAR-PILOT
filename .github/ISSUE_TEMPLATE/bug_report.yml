name: Bug report
description: Report a problem with InSAR-PILOT
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: InSAR-PILOT version or commit (see Help > About, or `git rev-parse HEAD`).
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - conda env (environment.yml)
        - pip install .
        - other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Ubuntu
        - WSL2
        - other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log excerpt
      description: Paste any relevant lines from the project `logs/` directory.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
