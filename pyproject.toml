[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "isce2-tops-gui"
version = "0.2.0"
description = "Desktop GUI orchestrator for ISCE2 Sentinel-1 TOPS stack workflows on Ubuntu/WSL."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
authors = [
  {name = "ISCE2 TOPS GUI Contributors"},
]
keywords = ["insar", "sentinel-1", "isce2", "topsstack", "pyside6", "wsl"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: X11 Applications :: Qt",
  "Intended Audience :: Science/Research",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: GIS",
]
dependencies = [
  "PySide6>=6.6",
  "pyshp>=2.3",
]

[project.urls]
Homepage = "https://github.com/WU-Pengzhan/isce-master"
Source = "https://github.com/WU-Pengzhan/isce-master"
Issues = "https://github.com/WU-Pengzhan/isce-master/issues"

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
  "ruff",
  "build",
]

[project.scripts]
isce2-gui = "isce2_gui.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
