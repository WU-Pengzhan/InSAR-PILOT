[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "isce2-tops-gui"
version = "0.1.0"
description = "Minimal desktop GUI for ISCE2 Sentinel-1 TOPS stack workflows on WSL."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "PySide6>=6.6",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4",
]

[project.scripts]
isce2-gui = "isce2_gui.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

